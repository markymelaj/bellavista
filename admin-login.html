<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · Minimarket Bellavista</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>🔒</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
  <script src="/config.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bark: #1e0f04; --espresso: #2d1505; --mahogany: #4a2010;
      --amber: #c87830; --honey: #d4a455; --gold: #e8b96a;
      --cream: #f5f0e8; --parchment: #ede5d4; --warm: #faf7f2;
      --ink: #1a0e06; --moss: #2e5c38;
      --hairline: rgba(30,15,4,0.10);
      --f-d: 'Cormorant Garamond', Georgia, serif;
      --f-b: 'Jost', system-ui, sans-serif;
    }
    body {
      min-height: 100vh;
      background: linear-gradient(135deg, var(--mahogany), var(--bark));
      display: flex; align-items: center; justify-content: center;
      padding: 1rem; font-family: var(--f-b);
    }
    .card {
      background: var(--warm);
      border-radius: 6px;
      padding: 2.5rem 2rem;
      width: 100%; max-width: 380px;
      box-shadow: 0 12px 40px rgba(0,0,0,0.3);
    }
    h1 {
      font-family: var(--f-d);
      font-size: 1.8rem; font-weight: 500;
      color: var(--ink);
      text-align: center;
      margin-bottom: 0.25rem;
    }
    .sub {
      text-align: center;
      font-size: 0.6rem; font-weight: 500;
      letter-spacing: 0.25em; text-transform: uppercase;
      color: rgba(26,14,6,0.55);
      margin-bottom: 1.5rem;
    }
    label {
      display: block;
      font-size: 0.6rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(26,14,6,0.6);
      margin-bottom: 0.3rem;
      margin-top: 0.9rem;
    }
    input {
      width: 100%;
      padding: 0.65rem 0.8rem;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      font-family: var(--f-b);
      font-size: 0.9rem;
      background: #fff;
    }
    input:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 2px rgba(200,120,48,0.15); }
    button {
      width: 100%;
      padding: 0.8rem;
      background: var(--moss);
      color: #fff;
      border: none;
      border-radius: 4px;
      font-family: var(--f-b);
      font-size: 0.7rem; font-weight: 700;
      letter-spacing: 0.18em; text-transform: uppercase;
      margin-top: 1.2rem;
      cursor: pointer;
    }
    button:hover { background: #235029; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .err {
      background: rgba(160,72,48,0.1);
      border: 1px solid rgba(160,72,48,0.3);
      color: #802818;
      padding: 0.5rem 0.7rem;
      border-radius: 4px;
      font-size: 0.75rem;
      margin-top: 0.8rem;
    }
    .back {
      display: block;
      text-align: center;
      margin-top: 1rem;
      font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(26,14,6,0.5);
      text-decoration: none;
    }
    .back:hover { color: var(--amber); }
  </style>
</head>
<body>
  <form class="card" id="login-form">
    <h1>Bellavista</h1>
    <div class="sub">Admin · Minimarket</div>
    <label for="email">Email</label>
    <input type="email" id="email" required autofocus />
    <label for="password">Contraseña</label>
    <input type="password" id="password" required />
    <div id="err" class="err" style="display:none"></div>
    <button type="submit" id="submit">Ingresar</button>
    <a href="/" class="back">← Volver al sitio</a>
  </form>

  <script>
    (async function() {
      // Si ya está logueado, manda al panel
      const { data: { user } } = await window.bv.auth.getUser();
      if (user) location.href = '/admin';
    })();

    document.getElementById('login-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      const email = document.getElementById('email').value.trim();
      const password = document.getElementById('password').value;
      const btn = document.getElementById('submit');
      const err = document.getElementById('err');
      err.style.display = 'none';
      btn.disabled = true;
      btn.textContent = 'Ingresando...';

      const { error } = await window.bv.auth.signInWithPassword({ email, password });
      if (error) {
        err.textContent = error.message;
        err.style.display = 'block';
        btn.disabled = false;
        btn.textContent = 'Ingresar';
        return;
      }
      location.href = '/admin';
    });
  </script>
</body>
</html>
