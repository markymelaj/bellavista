<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>QR Bellavista — Imprimir</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@300;400;500&family=Jost:wght@300;400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --ink:    #0a160c;
      --forest: #152218;
      --pine:   #1e3a24;
      --moss:   #2e5c38;
      --sage:   #5a9060;
      --mist:   #b8d8ba;
      --amber:  #c87e30;
      --gold:   #d4a455;
      --cream:  #f0e8d8;
      --f-d: "Cormorant Garamond", Georgia, serif;
      --f-b: "Jost", system-ui, sans-serif;
    }

    body {
      background: #e8e2d8;
      font-family: var(--f-b);
      color: var(--ink);
      min-height: 100svh;
      display: flex; flex-direction: column;
    }

    /* ---- SCREEN BAR ---- */
    .screen-bar {
      background: var(--forest);
      padding: 0.85rem 1.5rem;
      display: flex; align-items: center; justify-content: space-between; gap: 1rem;
    }
    .screen-brand {
      font-family: var(--f-d);
      font-size: 1.1rem; font-weight: 400;
      letter-spacing: 0.14em; text-transform: uppercase;
      color: var(--cream);
    }
    .screen-nav { display: flex; gap: 1rem; }
    .screen-nav a {
      font-size: 0.58rem; font-weight: 400;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(240,232,216,0.4);
      text-decoration: none; transition: color 0.2s;
    }
    .screen-nav a:hover { color: rgba(240,232,216,0.85); }

    /* ---- SCREEN ACTIONS ---- */
    .screen-actions {
      background: #d0c9be;
      border-bottom: 1px solid #bdb6ac;
      padding: 0.85rem 1.5rem;
      display: flex; gap: 0.65rem; align-items: center; flex-wrap: wrap;
    }
    .screen-actions small {
      font-size: 0.56rem; font-weight: 400;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(26,14,6,0.35); margin-left: auto;
    }
    .btn {
      display: inline-flex; align-items: center; gap: 0.4rem;
      padding: 0.6rem 1.1rem; border-radius: 3px; border: none; cursor: pointer;
      font-family: var(--f-b);
      font-size: 0.6rem; font-weight: 600;
      letter-spacing: 0.16em; text-transform: uppercase;
      text-decoration: none; transition: opacity 0.2s, transform 0.1s;
    }
    .btn:hover { opacity: 0.88; transform: translateY(-1px); }
    .btn-print    { background: var(--forest); color: var(--cream); }
    .btn-download { background: var(--amber);  color: #fff; }
    .btn-back     { background: rgba(26,14,6,0.1); color: rgba(26,14,6,0.5); border: 1px solid rgba(26,14,6,0.18); }

    /* ---- CARD WRAPPER ---- */
    .card-wrapper {
      flex: 1;
      display: flex; align-items: center; justify-content: center;
      padding: 2.5rem 1.5rem 3rem;
    }

    /* ---- THE CARD ---- */
    .card {
      width: 100%; max-width: 420px;
      background: #fff;
      border-radius: 6px; overflow: hidden;
      box-shadow: 0 12px 48px rgba(10,22,12,0.22), 0 2px 8px rgba(10,22,12,0.1);
    }

    /* PHOTO SECTION */
    .card-photo {
      position: relative;
      aspect-ratio: 16 / 9;
      overflow: hidden;
    }
    .card-photo img {
      position: absolute; inset: 0;
      width: 100%; height: 100%;
      object-fit: cover;
      object-position: center 35%;
      display: block;
      /* Imagen un poco más clara */
      filter: brightness(1.18) contrast(0.95);
    }
    .card-photo-overlay {
      position: absolute; inset: 0;
      background: linear-gradient(
        to bottom,
        rgba(10,22,12,0.0)  0%,
        rgba(10,22,12,0.05) 35%,
        rgba(10,22,12,0.62) 70%,
        rgba(10,22,12,0.90) 100%
      );
    }
    .card-photo-text {
      position: absolute; bottom: 0; left: 0; right: 0;
      padding: 1.1rem 1.8rem 1.5rem;
      text-align: center;
    }

    /* WORDMARK — Cormorant uppercase, sin italic, como en el hub */
    .card-wordmark {
      font-family: var(--f-d);
      font-style: normal;
      font-weight: 300;
      font-size: 3.2rem;
      letter-spacing: 0.22em;
      text-transform: uppercase;
      color: #fff;
      line-height: 1;
      text-shadow: 0 2px 20px rgba(10,22,12,0.45);
    }

    /* SUBTÍTULO — servicios debajo del nombre */
    .card-subtitle {
      margin-top: 0.45rem;
      font-family: var(--f-b);
      font-size: 0.58rem; font-weight: 400;
      letter-spacing: 0.28em; text-transform: uppercase;
      color: rgba(240,232,216,0.62);
    }

    .card-accent-line {
      width: 1.8rem; height: 1px;
      background: var(--sage);
      margin: 0.65rem auto 0; opacity: 0.9;
    }

    /* GRADIENT DIVIDER */
    .card-divider {
      height: 3px;
      background: linear-gradient(90deg, var(--moss), var(--amber), var(--gold), var(--amber), var(--moss));
    }

    /* QR SECTION */
    .card-qr-section {
      background: #fff;
      padding: 1.6rem 2rem 1.2rem;
      text-align: center;
    }
    .card-cta {
      font-size: 0.56rem; font-weight: 500;
      letter-spacing: 0.3em; text-transform: uppercase;
      color: rgba(10,22,12,0.32); margin-bottom: 1.1rem;
    }
    .card-qr-frame {
      display: inline-block;
      padding: 0.55rem;
      border: 1px solid rgba(10,22,12,0.1);
      border-radius: 4px;
      box-shadow: 0 2px 10px rgba(10,22,12,0.06);
    }
    .card-qr-frame img { display: block; width: 200px; height: 200px; }
    .card-url {
      display: block; margin-top: 0.85rem;
      font-size: 0.56rem; font-weight: 400;
      letter-spacing: 0.16em;
      color: rgba(10,22,12,0.3);
      text-decoration: none;
    }

    /* SERVICES STRIP */
    .card-services {
      background: var(--ink);
      padding: 0.85rem 1.2rem;
      display: flex; align-items: center; justify-content: space-around; flex-wrap: wrap; gap: 0.3rem;
    }
    .card-service {
      font-size: 0.48rem; font-weight: 500;
      letter-spacing: 0.22em; text-transform: uppercase;
      color: rgba(240,232,216,0.42);
      display: flex; align-items: center; gap: 0.3rem;
    }
    .card-sep { width: 1px; height: 11px; background: rgba(240,232,216,0.1); }

    /* ADDRESS */
    .card-address {
      background: var(--pine);
      padding: 0.58rem 1.5rem;
      text-align: center;
      font-size: 0.46rem; font-weight: 300;
      letter-spacing: 0.24em; text-transform: uppercase;
      color: rgba(240,232,216,0.28);
    }

    /* ============================================================
       PRINT
    ============================================================ */
    @media print {
      * {
        -webkit-print-color-adjust: exact !important;
        print-color-adjust: exact !important;
      }
      body { background: #fff; min-height: auto; }
      .screen-bar,
      .screen-actions { display: none !important; }
      .card-wrapper { padding: 0; min-height: auto; display: block; }
      .card {
        max-width: 14cm; width: 14cm;
        margin: 0.8cm auto;
        border-radius: 3px; box-shadow: none;
        border: 1px solid #ccc;
        page-break-inside: avoid;
      }
      .card-qr-frame img { width: 7cm; height: 7cm; }
    }

    @page { size: A4 portrait; margin: 0.5cm; }
  </style>
</head>
