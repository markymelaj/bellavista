<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Admin · Minimarket Bellavista</title>
  <meta name="robots" content="noindex, nofollow" />
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⚙️</text></svg>" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@400;500&family=Jost:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2.45.0/dist/umd/supabase.min.js"></script>
  <script src="/config.js"></script>

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --bark: #1e0f04; --espresso: #2d1505; --mahogany: #4a2010;
      --amber: #c87830; --honey: #d4a455; --gold: #e8b96a;
      --cream: #f5f0e8; --parchment: #ede5d4; --warm: #faf7f2;
      --ink: #1a0e06; --moss: #2e5c38; --sage: #5a9060;
      --hairline: rgba(30,15,4,0.10);
      --f-d: 'Cormorant Garamond', Georgia, serif;
      --f-b: 'Jost', system-ui, sans-serif;
    }
    body { background: var(--warm); color: var(--ink); font-family: var(--f-b); min-height: 100vh; }
    a { color: inherit; text-decoration: none; }
    button { font-family: inherit; cursor: pointer; }
    input, select, textarea { font-family: inherit; }

    .bar {
      background: var(--espresso); color: var(--cream);
      padding: 0.75rem 1.5rem;
    }
    .bar-inner {
      max-width: 1400px; margin: 0 auto;
      display: flex; align-items: center; justify-content: space-between;
    }
    .brand {
      font-family: var(--f-d);
      font-size: 1.1rem; font-weight: 500;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: var(--gold);
    }
    .bar-actions { display: flex; align-items: center; gap: 1rem; }
    .bar-back, .bar-logout {
      font-size: 0.6rem; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(245,240,232,0.7);
      background: none; border: 1px solid rgba(245,240,232,0.18);
      padding: 0.35rem 0.7rem; border-radius: 3px;
    }
    .bar-back:hover, .bar-logout:hover { color: var(--gold); border-color: var(--gold); }

    .shell {
      max-width: 1400px; margin: 0 auto;
      display: grid; grid-template-columns: 220px 1fr;
      gap: 1rem; padding: 1rem;
    }
    @media (max-width: 768px) {
      .shell { grid-template-columns: 1fr; }
      .sidebar { order: 2; }
    }

    .sidebar {
      background: #fff;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      padding: 0.6rem;
      height: fit-content;
      position: sticky; top: 1rem;
    }
    .nav-item {
      display: flex; align-items: center; gap: 0.6rem;
      padding: 0.65rem 0.75rem;
      border-radius: 4px;
      color: var(--ink);
      font-size: 0.85rem; font-weight: 500;
      cursor: pointer;
    }
    .nav-item:hover { background: var(--parchment); }
    .nav-item.active { background: var(--espresso); color: var(--cream); }
    .nav-item.active .nav-ico { filter: brightness(1.5); }
    .nav-ico { font-size: 1.1rem; }
    .user-info {
      margin-top: 0.8rem; padding-top: 0.7rem;
      border-top: 1px solid var(--hairline);
      font-size: 0.65rem;
      color: rgba(26,14,6,0.55);
      word-break: break-all;
      padding: 0.7rem 0.75rem 0;
    }

    .main {
      background: #fff;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      padding: 1.5rem;
      min-height: 70vh;
    }
    h1 {
      font-family: var(--f-d);
      font-size: 1.8rem; font-weight: 500;
      color: var(--ink);
      margin-bottom: 0.3rem;
    }
    h1 + .sub {
      font-size: 0.65rem; font-weight: 500;
      letter-spacing: 0.18em; text-transform: uppercase;
      color: rgba(26,14,6,0.55);
      margin-bottom: 1.5rem;
    }

    .stats {
      display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      gap: 1rem; margin-bottom: 2rem;
    }
    .stat {
      background: var(--warm);
      border: 1px solid var(--hairline);
      border-radius: 4px;
      padding: 1.2rem;
    }
    .stat-label {
      font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.2em; text-transform: uppercase;
      color: rgba(26,14,6,0.55);
      margin-bottom: 0.4rem;
    }
    .stat-value {
      font-family: var(--f-d);
      font-size: 2rem; font-weight: 500;
      color: var(--ink);
      line-height: 1;
    }

    .actions {
      display: flex; gap: 0.5rem; flex-wrap: wrap;
      align-items: center; margin-bottom: 1rem;
    }
    .btn {
      padding: 0.55rem 0.9rem;
      background: var(--moss); color: #fff;
      border: none; border-radius: 4px;
      font-size: 0.62rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
    }
    .btn:hover { background: #235029; }
    .btn.ghost {
      background: transparent; color: var(--ink);
      border: 1px solid var(--hairline);
    }
    .btn.ghost:hover { background: var(--parchment); }
    .btn.danger { background: #a04830; }
    .btn.danger:hover { background: #802818; }
    .inp, .sel {
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      font-size: 0.85rem;
      background: #fff;
    }
    .inp:focus, .sel:focus { outline: none; border-color: var(--amber); box-shadow: 0 0 0 2px rgba(200,120,48,0.15); }

    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 0.82rem; }
    th {
      text-align: left;
      padding: 0.6rem 0.5rem;
      border-bottom: 2px solid var(--hairline);
      font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(26,14,6,0.55);
    }
    td {
      padding: 0.55rem 0.5rem;
      border-bottom: 1px solid var(--hairline);
      vertical-align: middle;
    }
    tr:hover { background: var(--warm); }
    table input[type="number"], table input[type="text"] {
      width: 100%;
      padding: 0.3rem 0.4rem;
      border: 1px solid var(--hairline);
      border-radius: 3px;
      font-size: 0.82rem;
    }
    .pill {
      display: inline-block;
      padding: 0.18rem 0.55rem;
      border-radius: 99px;
      font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.1em; text-transform: uppercase;
    }
    .pill.green { background: rgba(46,92,56,0.15); color: var(--moss); }
    .pill.amber { background: rgba(200,120,48,0.15); color: var(--amber); }
    .pill.gray { background: var(--parchment); color: rgba(26,14,6,0.55); }
    .pill.red { background: rgba(160,72,48,0.15); color: #a04830; }

    .empty {
      text-align: center;
      padding: 3rem 1rem;
      color: rgba(26,14,6,0.5);
      font-style: italic;
    }

    .modal-bg {
      position: fixed; inset: 0;
      background: rgba(30,15,4,0.65);
      display: none;
      align-items: center; justify-content: center;
      z-index: 200; padding: 1rem;
    }
    .modal-bg.open { display: flex; }
    .modal {
      background: #fff;
      border-radius: 4px;
      max-width: 600px; width: 100%;
      max-height: 90vh; overflow-y: auto;
    }
    .modal-header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--hairline);
      display: flex; align-items: center; justify-content: space-between;
    }
    .modal-title {
      font-family: var(--f-d);
      font-size: 1.4rem; font-weight: 500;
    }
    .modal-close {
      background: none; border: none;
      font-size: 1.6rem; line-height: 1;
      color: rgba(26,14,6,0.4);
      padding: 0; width: 32px; height: 32px;
    }
    .modal-body { padding: 1.5rem; }
    .modal-body label {
      display: block;
      font-size: 0.55rem; font-weight: 700;
      letter-spacing: 0.15em; text-transform: uppercase;
      color: rgba(26,14,6,0.55);
      margin-bottom: 0.25rem;
      margin-top: 0.8rem;
    }
    .modal-body label:first-child { margin-top: 0; }
    .modal-body input, .modal-body select, .modal-body textarea {
      width: 100%;
      padding: 0.55rem 0.7rem;
      border: 1px solid var(--hairline);
      border-radius: 4px;
      font-size: 0.85rem;
    }
    .modal-body textarea { min-height: 70px; resize: vertical; }
    .modal-row { display: grid; grid-template-columns: 1fr 1fr; gap: 0.7rem; }
    .modal-footer {
      padding: 1rem 1.5rem;
      border-top: 1px solid var(--hairline);
      display: flex; gap: 0.5rem; justify-content: flex-end;
    }

    .checkbox-label {
      display: flex; align-items: center; gap: 0.5rem;
      font-size: 0.85rem !important;
      text-transform: none !important;
      letter-spacing: 0 !important;
      margin-top: 1rem !important;
      color: var(--ink) !important;
    }
    .checkbox-label input[type="checkbox"] {
      width: auto !important;
      margin: 0; padding: 0;
    }

    /* ---- Photo dropzone ---- */
    .dropzone {
      border: 2px dashed var(--hairline);
      border-radius: 6px;
      background: var(--warm);
      min-height: 140px;
      display: flex; align-items: center; justify-content: center;
      cursor: pointer;
      position: relative;
      overflow: hidden;
      transition: border-color 0.15s, background 0.15s;
    }
    .dropzone:hover { border-color: var(--amber); }
    .dropzone.dragover { border-color: var(--moss); background: rgba(46,92,56,0.06); }
    .dz-content { width: 100%; display: flex; align-items: center; justify-content: center; }
    .dz-placeholder { text-align: center; padding: 1.5rem 1rem; color: rgba(26,14,6,0.5); }
    .dz-icon { font-size: 2rem; display: block; margin-bottom: 0.5rem; }
    .dz-text { font-size: 0.78rem; line-height: 1.4; }
    .dz-preview { max-width: 100%; max-height: 200px; object-fit: contain; display: block; }
    .dz-progress { position: absolute; left: 0; right: 0; bottom: 0; height: 4px; background: rgba(0,0,0,0.08); }
    .dz-bar { height: 100%; width: 0%; background: var(--moss); transition: width 0.3s; }
    .dz-actions { display: flex; gap: 0.5rem; margin-top: 0.6rem; }
    .dz-btn { flex: 1; }
    .dz-url-details { margin-top: 0.8rem; }
    .dz-url-details summary {
      font-size: 0.7rem; color: rgba(26,14,6,0.55);
      cursor: pointer; letter-spacing: 0.05em;
    }
    .dz-url-details summary:hover { color: var(--amber); }

    .setup-warning {
      background: rgba(200,120,48,0.1);
      border: 1px solid rgba(200,120,48,0.3);
      color: var(--mahogany);
      padding: 1rem 1.2rem;
      border-radius: 4px;
      margin-bottom: 1rem;
      font-size: 0.85rem;
    }
    .setup-warning code {
      background: rgba(0,0,0,0.05);
      padding: 0.1rem 0.4rem;
      border-radius: 3px;
      font-size: 0.78rem;
    }

    .filters-row {
      display: grid;
      grid-template-columns: 1fr auto auto auto;
      gap: 0.5rem;
      margin-bottom: 1rem;
    }
    @media (max-width: 640px) {
      .filters-row { grid-template-columns: 1fr 1fr; }
      .filters-row .btn { grid-column: 1 / -1; }
    }
  </style>
</head>
<body>

  <header class="bar">
    <div class="bar-inner">
      <span class="brand">Admin · Bellavista</span>
      <div class="bar-actions">
        <a href="/minimarket" class="bar-back">← Ver sitio</a>
        <button class="bar-logout" id="logout-btn">Salir</button>
      </div>
    </div>
  </header>

  <div class="shell">
    <nav class="sidebar">
      <a class="nav-item" data-view="dashboard"><span class="nav-ico">📊</span> Dashboard</a>
      <a class="nav-item" data-view="productos"><span class="nav-ico">📦</span> Productos</a>
      <a class="nav-item" data-view="categorias"><span class="nav-ico">🏷️</span> Categorías</a>
      <a class="nav-item" data-view="pedidos"><span class="nav-ico">🧾</span> Pedidos</a>
      <a class="nav-item" data-view="settings"><span class="nav-ico">⚙️</span> Settings</a>
      <div class="user-info" id="user-info"></div>
    </nav>
    <main class="main" id="main">
      <div class="empty">Cargando...</div>
    </main>
  </div>

  <!-- MODAL -->
  <div class="modal-bg" id="modal-bg">
    <div class="modal">
      <div class="modal-header">
        <h3 class="modal-title" id="modal-title">Editar</h3>
        <button class="modal-close" onclick="closeModal()">&times;</button>
      </div>
      <div class="modal-body" id="modal-body"></div>
      <div class="modal-footer" id="modal-footer"></div>
    </div>
  </div>

<script>
  // =========================================================
  // AUTH GUARD
  // =========================================================
  (async function() {
    const { data: { user }, error } = await window.bv.auth.getUser();
    if (!user) { location.href = '/admin-login'; return; }
    document.getElementById('user-info').textContent = user.email;
    boot();
  })();

  document.getElementById('logout-btn').addEventListener('click', async function() {
    await window.bv.auth.signOut();
    location.href = '/admin-login';
  });

  // =========================================================
  // HELPERS
  // =========================================================
  const $ = sel => document.querySelector(sel);
  const fmt = n => '$' + (Number(n) || 0).toLocaleString('es-CL');
  const norm = s => (s || '').toString().toLowerCase().normalize('NFD').replace(/[\u0300-\u036f]/g, '');
  const esc = s => String(s == null ? '' : s).replace(/[&<>"]/g, c => ({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;'}[c]));

  function fmtItemQty(qty, unit) {
    qty = Number(qty) || 0;
    unit = String(unit || 'unidad').toLowerCase();
    if (unit === 'kg') {
      if (qty < 1) return Math.round(qty * 1000) + ' g';
      return qty.toLocaleString('es-CL', { maximumFractionDigits: 3 }) + ' kg';
    }
    return Math.round(qty) + 'x';
  }
  function fmtItemPriceUnit(unit) {
    return String(unit || 'unidad').toLowerCase() === 'kg' ? '/ kg' : 'c/u';
  }

  const STATUS_LABELS = {
    nuevo:'Nuevo', confirmado:'Confirmado', en_preparacion:'En preparación', preparado:'Preparado',
    listo:'Retiro listo', despachado:'Despachado', retirado:'Retirado', enviado:'Enviado', entregado:'Entregado', cancelado:'Cancelado'
  };
  function statusText(status) { return STATUS_LABELS[status] || status || '—'; }
  function isClosedStatus(status) { return ['despachado','retirado','entregado'].includes(status); }
  function pillFor(status) {
    return { nuevo:'amber', confirmado:'green', en_preparacion:'green', preparado:'green', listo:'green', despachado:'gray', retirado:'gray', enviado:'gray', entregado:'gray', cancelado:'red' }[status] || 'gray';
  }

  function isCancelledStatus(status) { return status === 'cancelado'; }
  function isRevenueStatus(status) { return status !== 'cancelado'; }
  function isPendingStatus(status) { return !isClosedStatus(status) && !isCancelledStatus(status); }
  function orderStatusPayload(status) {
    const payload = { status };
    if (isClosedStatus(status)) {
      payload.completed_at = new Date().toISOString();
      payload.canceled_at = null;
    } else if (isCancelledStatus(status)) {
      payload.completed_at = null;
      payload.canceled_at = new Date().toISOString();
    } else {
      payload.completed_at = null;
      payload.canceled_at = null;
    }
    return payload;
  }
  async function saveOrderStatus(id, status) {
    const payload = orderStatusPayload(status);
    let { error } = await window.bv.from('orders').update(payload).eq('id', id);
    // Compatibilidad si el SQL nuevo aún no se ejecutó: se guarda el estado igual.
    if (error && /canceled_at/i.test(error.message || '')) {
      delete payload.canceled_at;
      ({ error } = await window.bv.from('orders').update(payload).eq('id', id));
    }
    if (error && /completed_at/i.test(error.message || '')) {
      delete payload.completed_at;
      ({ error } = await window.bv.from('orders').update(payload).eq('id', id));
    }
    if (error) throw error;
    return payload;
  }
  function updateOrderObject(order, status, payload) {
    if (!order) return;
    order.status = status;
    if ('completed_at' in payload) order.completed_at = payload.completed_at;
    if ('canceled_at' in payload) order.canceled_at = payload.canceled_at;
  }
  function statusSelectHTML(orderId, status, compact=false) {
    return `<select class="sel pill ${pillFor(status)}" data-set-status="${orderId}" style="padding:${compact ? '0.2rem 0.45rem' : '0.25rem 0.55rem'};font-weight:700;letter-spacing:0.08em;min-width:${compact ? '128px' : '150px'}">
      ${STATUSES.map(s => `<option value="${s.v}" ${status === s.v ? 'selected':''}>${s.l}</option>`).join('')}
    </select>`;
  }
  function bindStatusControls(root, orders, afterSave) {
    root.querySelectorAll('select[data-set-status]').forEach(sel => {
      sel.addEventListener('change', async e => {
        const id = e.target.dataset.setStatus;
        const previous = (orders.find(x => x.id === id) || {}).status || 'nuevo';
        const status = e.target.value;
        e.target.disabled = true;
        try {
          const payload = await saveOrderStatus(id, status);
          updateOrderObject(orders.find(x => x.id === id), status, payload);
          e.target.className = 'sel pill ' + pillFor(status);
          if (typeof afterSave === 'function') afterSave(id, status, payload);
        } catch (err) {
          e.target.value = previous;
          e.target.className = 'sel pill ' + pillFor(previous);
          alert('No se pudo cambiar el estado. Revisa que estés logueado en admin y que el SQL de pedidos esté ejecutado. Error: ' + (err.message || err));
        } finally {
          e.target.disabled = false;
        }
      });
    });
  }

  // =========================================================
  // ROUTER
  // =========================================================
  let CATS_CACHE = null;

  async function boot() {
    window.addEventListener('hashchange', route);
    route();
  }

  function route() {
    const view = (location.hash.replace('#','') || 'dashboard');
    document.querySelectorAll('.nav-item').forEach(n => {
      n.classList.toggle('active', n.dataset.view === view);
    });
    if (view === 'dashboard')   renderDashboard();
    else if (view === 'productos')  renderProductos();
    else if (view === 'categorias') renderCategorias();
    else if (view === 'pedidos')    renderPedidos();
    else if (view === 'settings')   renderSettings();
    else renderDashboard();
  }

  document.querySelectorAll('.nav-item').forEach(n => {
    n.addEventListener('click', () => location.hash = '#' + n.dataset.view);
  });

  // =========================================================
  // DASHBOARD
  // =========================================================
  async function renderDashboard() {
    const main = $('#main');
    main.innerHTML = `<h1>Dashboard</h1><div class="sub">Vista general</div><div class="empty">Cargando...</div>`;

    const todayStart = new Date(); todayStart.setHours(0,0,0,0);

    const [prods, cats, today, total, recent, analytics, cancelledExact] = await Promise.all([
      window.bv.from('products').select('id', { count:'exact', head:true }).eq('active', true),
      window.bv.from('categories').select('id', { count:'exact', head:true }).eq('active', true),
      window.bv.from('orders').select('subtotal,status').gte('created_at', todayStart.toISOString()),
      window.bv.from('orders').select('id', { count:'exact', head:true }),
      window.bv.from('orders').select('id, order_number, customer_name, subtotal, status, created_at, delivery_type, delivery_detail, payment_method, notes, order_items(*)').order('created_at', { ascending:false }).limit(8),
      window.bv.from('orders').select('id, customer_name, subtotal, status, created_at, delivery_type, order_items(product_name, product_unit, quantity, subtotal)').order('created_at', { ascending:false }).limit(500),
      window.bv.from('orders').select('id', { count:'exact', head:true }).eq('status','cancelado')
    ]);

    const todayAll = today.data || [];
    const todayValid = todayAll.filter(o => isRevenueStatus(o.status));
    const todayTotal = todayValid.reduce((s,o)=>s + (Number(o.subtotal)||0), 0);
    const todayCount = todayAll.length;
    const todayCancelled = todayAll.filter(o => isCancelledStatus(o.status)).length;
    const allAnalytics = analytics.data || [];
    const validOrders = allAnalytics.filter(o => isRevenueStatus(o.status));
    const pendingCount = allAnalytics.filter(o => isPendingStatus(o.status)).length;
    const retiredCount = allAnalytics.filter(o => o.status === 'retirado').length;
    const dispatchedCount = allAnalytics.filter(o => o.status === 'despachado').length;
    const canceledCount = cancelledExact.count || allAnalytics.filter(o => o.status === 'cancelado').length;

    const productMap = {};
    validOrders.forEach(o => (o.order_items || []).forEach(it => {
      const key = (it.product_name || 'Producto') + '|' + (it.product_unit || 'unidad');
      if (!productMap[key]) productMap[key] = { name: it.product_name || 'Producto', unit: it.product_unit || 'unidad', qty: 0, total: 0, orders: new Set() };
      productMap[key].qty += Number(it.quantity) || 0;
      productMap[key].total += Number(it.subtotal) || 0;
      productMap[key].orders.add(o.id);
    }));
    const topProducts = Object.values(productMap).map(p => ({...p, ordersCount:p.orders.size})).sort((a,b) => b.total - a.total).slice(0, 5);

    const customerMap = {};
    validOrders.forEach(o => {
      const name = (o.customer_name || '').trim();
      if (!name) return;
      const key = norm(name);
      if (!customerMap[key]) customerMap[key] = { name, orders: 0, total: 0, last: o.created_at };
      customerMap[key].orders += 1;
      customerMap[key].total += Number(o.subtotal) || 0;
      if (new Date(o.created_at) > new Date(customerMap[key].last)) customerMap[key].last = o.created_at;
    });
    const repeatCustomers = Object.values(customerMap).filter(c => c.orders > 1).sort((a,b) => b.orders - a.orders || b.total - a.total).slice(0, 5);

      clearTimeout(timer); timer = setTimeout(renderProdRows, 200);

  async function reloadProds() {
    let query = window.bv.from('products')
      .select('id, sku, ean, name, category_id, price, stock, active, featured, image_url, needs_review, unit, description')
      .order('name')
      .limit(2000);
    // Importante: filtrar en Supabase evita perder productos por el límite de 1000 filas cuando hay mucho catálogo oculto.
    if (PROD_STATE.status === 'active') query = query.eq('active', true);
    if (PROD_STATE.status === 'inactive') query = query.eq('active', false);

    const [{ data, error }, activosRes, ocultosRes, destacadosRes, sinPrecioRes] = await Promise.all([
      query,
      window.bv.from('products').select('id', { count:'exact', head:true }).eq('active', true),
      window.bv.from('products').select('id', { count:'exact', head:true }).eq('active', false),
      window.bv.from('products').select('id', { count:'exact', head:true }).eq('featured', true),
      window.bv.from('products').select('id', { count:'exact', head:true }).lte('price', 0)
    ]);
    if (error) {
      $('#prod-sub').textContent = 'Error: ' + error.message;
      return;
    }
    PROD_STATE.items = data || [];
    const activos = activosRes.count || 0;
    const ocultos = ocultosRes.count || 0;
    const destacados = destacadosRes.count || 0;
    const sinPrecio = sinPrecioRes.count || 0;
    $('#prod-sub').textContent = activos + ' usando ahora · ' + ocultos + ' en catálogo oculto · ' + destacados + ' destacados · ' + sinPrecio + ' sin precio · mostrando ' + PROD_STATE.items.length;
    renderProdRows();
  }

  function renderProdRows() {
    const cats = CATS_CACHE || [];
    const catMap = Object.fromEntries(cats.map(c => [c.id, c.name]));
    const q = norm(PROD_STATE.q);
    const items = PROD_STATE.items.filter(p => {
      if (PROD_STATE.cat && p.category_id !== PROD_STATE.cat) return false;
      if (PROD_STATE.status === 'active' && !p.active) return false;
      if (PROD_STATE.status === 'inactive' && p.active) return false;
      if (PROD_STATE.flag === 'featured' && !p.featured) return false;
      if (PROD_STATE.flag === 'review' && !p.needs_review) return false;
      if (PROD_STATE.flag === 'no_price' && Number(p.price) > 0) return false;
      if (q) {
        const n = norm(p.name);
        if (n.indexOf(q) === -1 && p.sku.indexOf(q) === -1) return false;
      }
      return true;
    });
    const tbody = $('#prod-table tbody');
    if (items.length === 0) {
      tbody.innerHTML = `<tr><td colspan="9" class="empty">Sin resultados</td></tr>`;
      return;
    }
    const shown = items.slice(0, 300);
    tbody.innerHTML = shown.map(p => `
      <tr data-id="${p.id}">
        <td style="font-family:monospace;font-size:0.7rem">${esc(p.sku)}</td>
        <td>${esc(p.name)} ${p.needs_review ? '<span class="pill amber" style="margin-left:6px">revisar</span>' : ''} ${Number(p.price) <= 0 ? '<span class="pill amber" style="margin-left:6px">sin precio</span>' : ''}</td>
        <td>${esc(catMap[p.category_id]) || '—'}</td>
        <td><input type="number" value="${p.price}" data-field="price" data-id="${p.id}" /></td>
        <td><span class="pill ${p.unit === 'kg' ? 'green' : 'gray'}">${esc(p.unit || 'unidad')}</span></td>
        <td><input type="number" value="${p.stock}" data-field="stock" data-id="${p.id}" /></td>
        <td><span class="pill ${p.featured ? 'green' : 'gray'}">${p.featured ? 'sí' : 'no'}</span></td>
        <td><span class="pill ${p.active ? 'green' : 'gray'}">${p.active ? 'usando ahora' : 'oculto'}</span></td>
        <td>
          <button class="btn ghost" data-toggle-active="${p.id}" style="padding:0.3rem 0.6rem;font-size:0.55rem">${p.active ? 'Ocultar' : 'Activar'}</button>
          <button class="btn ghost" data-edit="${p.id}" style="padding:0.3rem 0.6rem;font-size:0.55rem">Editar</button>
        </td>
      </tr>`).join('');
    if (items.length > 300) {
      tbody.insertAdjacentHTML('beforeend', `<tr><td colspan="9" style="text-align:center;font-size:0.75rem;color:rgba(26,14,6,0.5);padding:1rem">... y ${items.length - 300} más (refiná la búsqueda)</td></tr>`);
    }

    // Inline edit (blur)
    tbody.querySelectorAll('input[data-field]').forEach(inp => {
      inp.addEventListener('blur', async e => {
        const id = e.target.dataset.id;
        const field = e.target.dataset.field;
        const value = parseInt(e.target.value, 10) || 0;
        const cur = PROD_STATE.items.find(x => x.id === id);
        if (cur && cur[field] === value) return;
        const { error } = await window.bv.from('products').update({ [field]: value }).eq('id', id);
        if (error) { alert('Error: ' + error.message); return; }
        if (cur) cur[field] = value;
      });
    });
    tbody.querySelectorAll('button[data-toggle-active]').forEach(btn => {
      btn.addEventListener('click', async () => {
        const id = btn.dataset.toggleActive;
        const p = PROD_STATE.items.find(x => x.id === id);
        if (!p) return;
        const next = !p.active;
        const msg = next ? '¿Activar este producto y dejarlo visible para clientes?' : '¿Ocultar este producto del minimarket?';
        if (!confirm(msg)) return;
        const { error } = await window.bv.from('products').update({ active: next, featured: next ? p.featured : false }).eq('id', id);
        if (error) { alert('Error: ' + error.message); return; }
        p.active = next;
        if (!next) p.featured = false;
        await reloadProds();
      });
    });
    tbody.querySelectorAll('button[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const id = btn.dataset.edit;
        const p = PROD_STATE.items.find(x => x.id === id);
        if (p) openProductModal(p, CATS_CACHE);
      });
    });
  }

  // =========================================================
  // PHOTO UPLOAD (Supabase Storage)
  // =========================================================
  function setupPhotoUpload(f) {
    const dz = $('#m-dropzone');
    const camBtn = $('#m-cam-btn');
    const galBtn = $('#m-gal-btn');
    const camInput = $('#m-cam-input');
    const galInput = $('#m-gal-input');
    if (!dz) return;

    camBtn.addEventListener('click', () => camInput.click());
    galBtn.addEventListener('click', () => galInput.click());
    camInput.addEventListener('change', e => { if (e.target.files[0]) handleImageFile(e.target.files[0]); });
    galInput.addEventListener('change', e => { if (e.target.files[0]) handleImageFile(e.target.files[0]); });

    // Drag & drop
    ['dragenter','dragover'].forEach(ev => dz.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation(); dz.classList.add('dragover');
    }));
    ['dragleave','drop'].forEach(ev => dz.addEventListener(ev, e => {
      e.preventDefault(); e.stopPropagation(); dz.classList.remove('dragover');
    }));
    dz.addEventListener('drop', e => {
      const file = e.dataTransfer.files[0];
      if (file && file.type.startsWith('image/')) handleImageFile(file);
    });
    // Click the dropzone (when empty) opens gallery
    dz.addEventListener('click', () => {
      if (!$('#m-preview')) galInput.click();
    });

    // If user pastes a URL manually, reflect in preview
    const urlInput = $('#m-img');
    if (urlInput) {
      urlInput.addEventListener('change', () => {
        const u = urlInput.value.trim();
        if (u) showPreview(u);
      });
    }
  }

  function showPreview(url) {
    const content = $('#m-dz-content');
    content.innerHTML = `<img id="m-preview" src="${esc(url)}" class="dz-preview"/>`;
  }

  async function handleImageFile(file) {
    const bar = $('#m-dz-bar');
    const progress = $('#m-dz-progress');
    try {
      // Resize/compress client-side before upload (max 800px, jpeg)
      const blob = await resizeImage(file, 800, 0.82);

      progress.style.display = 'block';
      bar.style.width = '40%';

      const ext = 'jpg';
      const path = 'prod-' + Date.now() + '-' + Math.random().toString(36).slice(2,7) + '.' + ext;

      const { error: upErr } = await window.bv.storage
        .from('product-images')
        .upload(path, blob, { contentType: 'image/jpeg', upsert: true });
      if (upErr) throw upErr;

      bar.style.width = '80%';

      const { data: pub } = window.bv.storage.from('product-images').getPublicUrl(path);
      const publicUrl = pub.publicUrl;

      bar.style.width = '100%';

      // Set URL field + preview
      const urlInput = $('#m-img');
      if (urlInput) urlInput.value = publicUrl;
      showPreview(publicUrl);

      setTimeout(() => { progress.style.display = 'none'; bar.style.width = '0%'; }, 600);
    } catch (e) {
      progress.style.display = 'none';
      bar.style.width = '0%';
      alert('Error subiendo la foto: ' + (e.message || e));
      console.error(e);
    }
  }

  // Resize an image File to a max dimension, return a Blob (JPEG)
  function resizeImage(file, maxDim, quality) {
    return new Promise((resolve, reject) => {
      const img = new Image();
      const reader = new FileReader();
      reader.onload = e => { img.src = e.target.result; };
      reader.onerror = reject;
      img.onload = () => {
        let { width, height } = img;
        if (width > maxDim || height > maxDim) {
          if (width >= height) { height = Math.round(height * maxDim / width); width = maxDim; }
          else { width = Math.round(width * maxDim / height); height = maxDim; }
        }
        const canvas = document.createElement('canvas');
        canvas.width = width; canvas.height = height;
        const ctx = canvas.getContext('2d');
        ctx.fillStyle = '#fff';
        ctx.fillRect(0, 0, width, height);
        ctx.drawImage(img, 0, 0, width, height);
        canvas.toBlob(b => b ? resolve(b) : reject(new Error('No se pudo procesar la imagen')), 'image/jpeg', quality);
      };
      img.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  async function loadCats(force) {
    if (!force && CATS_CACHE) return CATS_CACHE;
    const { data } = await window.bv.from('categories').select('*').order('position');
    CATS_CACHE = data || [];
    return CATS_CACHE;
  }

  // CATEGORÍAS
  // =========================================================
  async function renderCategorias() {
    const main = $('#main');
    main.innerHTML = `
      <h1>Categorías</h1>
      <div class="sub" id="cat-sub">Cargando...</div>
      <div class="actions"><button class="btn" id="new-cat">+ Nueva categoría</button></div>
      <div class="table-wrap"><table id="cat-table">
        <thead><tr><th style="width:60px">Orden</th><th>Foto</th><th>Nombre</th><th>Slug</th><th>Ícono</th><th>Productos</th><th>Activa</th><th></th></tr></thead>
        <tbody><tr><td colspan="8" class="empty">Cargando...</td></tr></tbody>
      </table></div>
    `;

    const cats = await loadCats(true);
    // counts per cat
    const counts = {};
    for (const c of cats) {
      const { count } = await window.bv.from('products').select('id', { count:'exact', head:true }).eq('category_id', c.id);
      counts[c.id] = count || 0;
    }

    $('#cat-sub').textContent = cats.length + ' categorías';
    const tbody = $('#cat-table tbody');
    tbody.innerHTML = cats.map(c => `
      <tr data-id="${c.id}">
        <td>${c.position}</td>
        <td>${c.image_url ? `<img src="${esc(c.image_url)}" style="width:56px;height:40px;object-fit:cover;border-radius:4px;border:1px solid rgba(26,14,6,0.12)"/>` : '—'}</td>
        <td><strong>${esc(c.name)}</strong></td>
        <td style="font-family:monospace;font-size:0.7rem">${esc(c.slug)}</td>
        <td style="font-family:monospace;font-size:0.7rem">${esc(c.icon)}</td>
        <td>${counts[c.id] || 0}</td>
        <td><input type="checkbox" ${c.active ? 'checked':''} data-toggle-active="${c.id}"/></td>
        <td><button class="btn ghost" data-edit="${c.id}" style="padding:0.3rem 0.6rem;font-size:0.55rem">Editar</button></td>
      </tr>`).join('');

    tbody.querySelectorAll('input[data-toggle-active]').forEach(chk => {
      chk.addEventListener('change', async e => {
        const id = e.target.dataset.toggleActive;
        await window.bv.from('categories').update({ active: e.target.checked }).eq('id', id);
      });
    });
    tbody.querySelectorAll('button[data-edit]').forEach(btn => {
      btn.addEventListener('click', () => {
        const c = cats.find(x => x.id === btn.dataset.edit);
        if (c) openCategoryModal(c);
      });
    });
    $('#new-cat').addEventListener('click', () => openCategoryModal(null));
  }


  function setupCategoryPhotoUpload() {
    const btn = $('#cm-upload-btn');
    const input = $('#cm-file-input');
    const status = $('#cm-upload-status');
    const urlInput = $('#cm-img');
    const preview = $('#cm-img-preview');
    if (!btn || !input) return;
    btn.addEventListener('click', () => input.click());
    input.addEventListener('change', async e => {
      const file = e.target.files && e.target.files[0];
      if (!file) return;
      try {
        if (status) status.textContent = 'Subiendo imagen...';
        const blob = await resizeImage(file, 1100, 0.84);
        const path = 'categories/cat-' + Date.now() + '-' + Math.random().toString(36).slice(2,7) + '.jpg';
        const { error: upErr } = await window.bv.storage
          .from('product-images')
          .upload(path, blob, { contentType: 'image/jpeg', upsert: true });
        if (upErr) throw upErr;
        const { data: pub } = window.bv.storage.from('product-images').getPublicUrl(path);
        const publicUrl = pub.publicUrl;
        if (urlInput) urlInput.value = publicUrl;
        if (preview) preview.innerHTML = `<img src="${esc(publicUrl)}" style="width:100%;max-height:150px;object-fit:cover;border-radius:6px;border:1px solid rgba(26,14,6,0.12)"/>`;
        if (status) status.textContent = 'Imagen cargada. Presiona Guardar.';
      } catch (err) {
        if (status) status.textContent = '';
        alert('Error subiendo foto de categoría: ' + (err.message || err));
      }
    });
    if (urlInput) {
      urlInput.addEventListener('change', () => {
        const u = urlInput.value.trim();
        if (u && preview) preview.innerHTML = `<img src="${esc(u)}" style="width:100%;max-height:150px;object-fit:cover;border-radius:6px;border:1px solid rgba(26,14,6,0.12)"/>`;
      });
    }
  }

  function openCategoryModal(c) {
    const isNew = !c;
    const f = c || { name:'', slug:'', icon:'Package', image_url:'', position:100, active:true };
    $('#modal-title').textContent = isNew ? 'Nueva categoría' : 'Editar categoría';
    $('#modal-body').innerHTML = `
      <label>Nombre *</label><input id="cm-name" value="${esc(f.name)}" />
      <label>Slug</label><input id="cm-slug" value="${esc(f.slug)}" placeholder="se genera del nombre si está vacío" />
      <label>Ícono (lucide-react)</label><input id="cm-icon" value="${esc(f.icon)}" placeholder="Package, Wine, Milk..."/>
      <label>Foto de categoría / portada</label>
      <div style="border:1px dashed rgba(26,14,6,0.2);border-radius:6px;padding:0.8rem;background:#fff;margin-bottom:0.5rem">
        <div id="cm-img-preview">
          ${f.image_url ? `<img src="${esc(f.image_url)}" style="width:100%;max-height:150px;object-fit:cover;border-radius:6px;border:1px solid rgba(26,14,6,0.12)"/>` : `<div style="font-size:0.8rem;color:rgba(26,14,6,0.45);padding:1rem;text-align:center">Sin foto de categoría</div>`}
        </div>
        <button class="btn ghost" type="button" id="cm-upload-btn" style="margin-top:0.7rem">Subir foto desde PC</button>
        <input type="file" id="cm-file-input" accept="image/*" style="display:none"/>
        <div id="cm-upload-status" style="font-size:0.72rem;color:rgba(26,14,6,0.5);margin-top:0.45rem"></div>
      </div>
      <details><summary style="font-size:0.72rem;color:rgba(26,14,6,0.55);cursor:pointer">O pegar URL de imagen</summary><input id="cm-img" value="${esc(f.image_url || '')}" placeholder="https://..." style="margin-top:0.5rem"/></details>
      <small style="font-size:0.7rem;color:rgba(26,14,6,0.5);display:block;margin-top:0.4rem">
        Sugeridos: Croissant, Wine, Milk, ShoppingBasket, Cookie, Apple, Beef, Sparkles, Bath, Cigarette, Pill, Package
      </small>
      <label>Orden de aparición</label><input id="cm-pos" type="number" value="${f.position}" />
      <label class="checkbox-label"><input type="checkbox" id="cm-active" ${f.active ? 'checked':''}/> Activa (visible en web)</label>
    `;
    $('#modal-footer').innerHTML = `
      <button class="btn ghost" onclick="closeModal()">Cancelar</button>
      <button class="btn" id="cm-save">${isNew ? 'Crear' : 'Guardar'}</button>
    `;
    $('#modal-bg').classList.add('open');
    setupCategoryPhotoUpload();

    $('#cm-save').addEventListener('click', async () => {
      const name = $('#cm-name').value.trim();
      if (!name) { alert('Nombre requerido'); return; }
      const slug = $('#cm-slug').value.trim() || norm(name).replace(/[^a-z0-9]+/g,'-').replace(/^-|-$/g,'');
      const payload = {
        name, slug,
        icon: $('#cm-icon').value.trim() || 'Package',
        image_url: $('#cm-img').value.trim() || null,
        position: parseInt($('#cm-pos').value, 10) || 100,
        active: $('#cm-active').checked
      };
      let res;
      if (isNew) res = await window.bv.from('categories').insert(payload).select().single();
      else res = await window.bv.from('categories').update(payload).eq('id', f.id).select().single();
      if (res.error && String(res.error.message || '').indexOf('image_url') !== -1) {
        delete payload.image_url;
        if (isNew) res = await window.bv.from('categories').insert(payload).select().single();
        else res = await window.bv.from('categories').update(payload).eq('id', f.id).select().single();
        alert('La categoría se guardó, pero falta ejecutar el SQL final para habilitar fotos de categorías.');
      }
      if (res.error) { alert(res.error.message); return; }
      CATS_CACHE = null;
      closeModal();
      renderCategorias();
    });
  }

  // =========================================================
  // PEDIDOS
  // =========================================================
  const STATUSES = [
    { v:'nuevo', l:'Nuevo' },
    { v:'confirmado', l:'Confirmado' },
    { v:'en_preparacion', l:'En preparación' },
    { v:'preparado', l:'Preparado' },
    { v:'listo', l:'Retiro listo' },
    { v:'despachado', l:'Despachado' },
    { v:'retirado', l:'Retirado' },
    { v:'cancelado', l:'Cancelado' }
  ];


  function deliveryLabel(o) {
    if (!o) return '—';
    if (o.delivery_type === 'envio_confirmar') return 'Envío a confirmar' + (o.delivery_detail ? ': ' + esc(o.delivery_detail) : '');
    if (o.delivery_type === 'sitio_camping') return 'Sitio ' + esc(o.delivery_detail || '');
    return 'Retiro';
  }

  async function renderPedidos() {
    const main = $('#main');
    main.innerHTML = `
      <h1>Pedidos</h1>
      <div class="sub" id="ord-sub">Cargando...</div>
      <div id="ord-msg" style="display:none;margin:0 0 0.8rem;padding:0.65rem 0.8rem;border:1px solid var(--hairline);background:var(--warm);font-size:0.78rem"></div>
      <div class="actions" style="align-items:center;gap:0.6rem;flex-wrap:wrap">
        <select class="sel" id="ord-filter">
          <option value="">Todos los estados</option>
          ${STATUSES.map(s => `<option value="${s.v}">${s.l}</option>`).join('')}
        </select>
        <input class="inp" id="ord-q" placeholder="Buscar cliente, nota o pedido..." style="max-width:320px" />
      </div>
      <div class="table-wrap"><table id="ord-table">
        <thead><tr><th>N°</th><th>Fecha</th><th>Cliente</th><th>Entrega</th><th>Total</th><th>Estado</th><th></th></tr></thead>
        <tbody><tr><td colspan="7" class="empty">Cargando...</td></tr></tbody>
      </table></div>
    `;

    let orders = [];
    const showMsg = (msg, danger=false) => {
      const el = $('#ord-msg');
      if (!el) return;
      el.style.display = 'block';
      el.style.borderColor = danger ? 'rgba(160,72,48,0.4)' : 'rgba(46,92,56,0.25)';
      el.style.color = danger ? '#a04830' : 'var(--moss)';
      el.textContent = msg;
      if (!danger) setTimeout(() => { if (el) el.style.display = 'none'; }, 2500);
    };

    async function reload() {
      const { data, error } = await window.bv.from('orders')
        .select('*, order_items(*)')
        .order('created_at', { ascending:false })
        .limit(300);
      if (error) { $('#ord-sub').textContent = 'Error: ' + error.message; return; }
      orders = data || [];
      paint();
    }

    function paint() {
      const filter = $('#ord-filter').value;
      const q = norm($('#ord-q').value);
      const items = orders.filter(o => {
        if (filter && o.status !== filter) return false;
        if (!q) return true;
        const hay = [o.order_number, o.customer_name, o.delivery_detail, o.notes, o.status, ...(o.order_items || []).map(it => it.product_name)].join(' ');
        return norm(hay).includes(q);
      });
      const validTotal = items.filter(o => isRevenueStatus(o.status)).reduce((s,o)=>s + (Number(o.subtotal)||0),0);
      const cancelled = items.filter(o => isCancelledStatus(o.status)).length;
      $('#ord-sub').textContent = `${items.length} pedido${items.length === 1 ? '' : 's'} · venta válida ${fmt(validTotal)} · cancelados ${cancelled}`;
      const tbody = $('#ord-table tbody');
      if (items.length === 0) {
        tbody.innerHTML = `<tr><td colspan="7" class="empty">No hay pedidos</td></tr>`;
        return;
      }
      tbody.innerHTML = items.map(o => `
        <tr data-id="${o.id}">
          <td><strong>#${o.order_number}</strong></td>
          <td>${new Date(o.created_at).toLocaleString('es-CL', {dateStyle:'short', timeStyle:'short'})}</td>
          <td>${esc(o.customer_name) || '—'}</td>
          <td style="font-size:0.78rem">${deliveryLabel(o)}</td>
          <td>${fmt(isCancelledStatus(o.status) ? 0 : o.subtotal)}${isCancelledStatus(o.status) ? '<br><span style="font-size:0.65rem;color:#a04830">Cancelado: no suma</span>' : ''}</td>
          <td>${statusSelectHTML(o.id, o.status)}</td>
          <td><button class="btn ghost" data-toggle="${o.id}" style="padding:0.3rem 0.6rem;font-size:0.55rem">Ver</button></td>
        </tr>
        <tr id="det-${o.id}" style="display:none">
          <td colspan="7" style="background:var(--warm);padding:1rem">
            <div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(190px,1fr));gap:0.7rem;margin-bottom:0.7rem;font-size:0.78rem">
              <div><strong>Pago:</strong> ${esc({efectivo:'Efectivo',tarjeta:'Tarjeta',caja_vecina:'Caja Vecina'}[o.payment_method] || o.payment_method || '—')}</div>
              <div><strong>Entrega:</strong> ${deliveryLabel(o)}</div>
              <div><strong>Total original:</strong> ${fmt(o.subtotal)}</div>
            </div>
            <strong>Productos:</strong>
            <ul style="margin:0.5rem 0 0 1.2rem">
              ${(o.order_items || []).map(it => `<li style="font-size:0.8rem;margin-bottom:0.2rem"><strong>${fmtItemQty(it.quantity, it.product_unit)}</strong> ${esc(it.product_name)} — ${fmt(it.unit_price)} ${fmtItemPriceUnit(it.product_unit)} = <strong>${fmt(it.subtotal)}</strong></li>`).join('') || '<li style="font-size:0.8rem">Sin productos asociados. Revisar nota del pedido.</li>'}
            </ul>
            ${o.notes ? `<div style="font-size:0.78rem;margin-top:0.6rem"><strong>Nota / otros productos:</strong> ${esc(o.notes)}</div>` : ''}
          </td>
        </tr>
      `).join('');

      bindStatusControls(tbody, orders, (id, status, payload) => {
        const ord = orders.find(x => x.id === id);
        updateOrderObject(ord, status, payload);
        showMsg('Estado actualizado: ' + statusText(status));
        paint();
      });
      tbody.querySelectorAll('button[data-toggle]').forEach(btn => {
        btn.addEventListener('click', () => {
          const det = document.getElementById('det-' + btn.dataset.toggle);
          if (det) det.style.display = det.style.display === 'none' ? 'table-row' : 'none';
        });
      });
    }

    $('#ord-filter').addEventListener('change', paint);
    $('#ord-q').addEventListener('input', paint);
    await reload();
  }

        whatsapp: $('#s-wa').value.trim(),
        hours_open: parseInt($('#s-open').value, 10) || 9,

  // =========================================================

    $('#modal-bg').classList.remove('open');

  $('#modal-bg').addEventListener('click', e => {
    if (e.target.id === 'modal-bg') closeModal();
